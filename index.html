<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }
    .attribution a {
      color: hsl(228, 45%, 44%);
      text-decoration: none;
    }
    body {
      background-color: hsl(212, 45%, 89%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      min-height: 100vh;
      margin: 0;
      font-size: 15px;
      font-family: "Outfit", sans-serif;
    }
    .container {
      max-width: 320px;
    }
    .content {
      background-color: hsl(0, 0%, 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 16px;
      padding-bottom: 40px;
      border-radius: 10px;
      text-align: center;
      gap: 16px;
    }
    .qr img {
      max-width: 288px;
      border-radius: 10px;
      width: 100%;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      padding-bottom: 16px;
      color: hsl(218, 44%, 22%);
    }
    p {
      margin: 0;
      color: hsl(220, 15%, 55%);
      font-weight: 400;
    }
    footer {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="content">
      <figure class="qr">
        <img src="./images/image-qr-code.png" alt="QR Code to Frontend Mentor website">
        <figcaption>Scan to visit Frontend Mentor</figcaption>
      </figure>
      <div class="text">
        <h1>Improve your front-end skills by building projects</h1>
        <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
      </div>
    </div>
  </main>
  <footer>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener" aria-label="Visit Frontend Mentor website">Frontend Mentor</a>. 
      Coded by <a href="https://www.linkedin.com/in/carolin-krahmer-94661399/" target="_blank" rel="noopener">Carolin Krahmer</a>.
    </div>
  </footer>
</body>
</html>
